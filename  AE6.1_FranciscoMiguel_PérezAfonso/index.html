<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>All Shoes | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel = "stylesheet" href = "./images">
</head>
<body>
    <header>
        <a href="index.html" class="brand"><img src="./images/Logo.png" alt="Logo"><span>ALL SHOES</span></a>
        <nav>
            <a href="./index.html">INICIO</a>
            <a href="./tienda.html">TIENDA</a>
            <a href="./nosotros.html">NOSOTROS</a>
            <a href="./contacto.html">CONTACTO</a>
        </nav>
    </header>

    <main>
        <section class="hero" id="hero-section">
            <button class="arrow arrow-left" id="prevBtn">&#10094;</button>
            <button class="arrow arrow-right" id="nextBtn">&#10095;</button>
            
            <div class="content">
                <h1>Mike Tair <br> Jordan I</h1>
                <p style="margin: 15px 0; max-width: 450px;">Las zapatillas que definieron una era. Estilo único para pasos inolvidables.</p>
                <button class="btn-cart">🛒 ADD TO CART</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="socials">
            <img src="./images/nosotros/facebook-icon.png">
            <img src="./images/nosotros/instagram-logo.png">
            <img src="./images/nosotros/twitter-icon.png">
        </div>
        <p>ALL SHOES 2026</p>
    </footer>

    <script>
        const heroSection = document.getElementById('hero-section');
        
        const images = [
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./images/main/sneakers1.jpeg'),
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./images/main/sneakers2.jpeg'),
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./images/main/sneakers3.jpeg'),
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./images/main/sneakers4.jpeg'),
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./images/main/sneakers5.jpeg')
        ];
        
        let currentIndex = 0;

        function changeImage(index) {
            if(index < 0) currentIndex = images.length - 1;
            else if(index >= images.length) currentIndex = 0;
            else currentIndex = index;
            
            heroSection.style.backgroundImage = images[currentIndex];
        }

        
        document.getElementById('prevBtn').addEventListener('click', () => changeImage(currentIndex - 1));
        document.getElementById('nextBtn').addEventListener('click', () => changeImage(currentIndex + 1));

       
        setInterval(() => changeImage(currentIndex + 1), 4000);
        
      
        changeImage(0);
    </script>
</body>
</html>
