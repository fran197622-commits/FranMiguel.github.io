<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>All Shoes | Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand"><img src="Logo.png"> <span>ALL SHOES</span></a>
        <nav>
            <a href="index.html">INICIO</a>
            <a href="tienda.html">TIENDA</a>
            <a href="nosotros.html">NOSOTROS</a>
            <a href="contacto.html" style="color:var(--naranja)">CONTACTO</a>
        </nav>
    </header>

    <main>
        <div class="form-box">
            <h2 style="text-align: center; margin-bottom: 10px;">¿TIENES ALGUNA DUDA?</h2>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            
            <form>
                <div class="field-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="Tu nombre">
                </div>
                <div class="field-group">
                    <label>E-Mail (direcciones@email.com)</label>
                    <input type="email" placeholder="aa@sd.ss">
                </div>
                <div class="field-group">
                    <label>Teléfono (XXX XXX XXX)</label>
                    <input type="text" placeholder="123456789">
                </div>
                <div class="field-group">
                    <label>TEMA</label>
                    <select>
                        <option>Selecciona un tema</option>
                        <option>Duda</option>
                        <option>Devolución</option>
                    </select>
                </div>
                <button type="button" class="btn-cart" style="width: 100%; justify-content: center; background: #111;">✈ ENVIAR</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="socials">
            <img src="./images/nosotros/facebook-icon.png">
            <img src="./images/nosotros/instagram-logo.png">
        </div>
        <p>ALL SHOES 2026</p>
    </footer>
</body>
</html>
