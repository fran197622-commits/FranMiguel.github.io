<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>All Shoes | Tienda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand"><img src="./images/Logo.png" alt="Logo"><span>ALL SHOES</span></a>
        <nav>
            <a href="index.html">INICIO</a>
            <a href="tienda.html" style="color:var(--naranja)">TIENDA</a>
            <a href="nosotros.html">NOSOTROS</a>
            <a href="contacto.html">CONTACTO</a>
        </nav>
    </header>

    <main>
        <h2 style="text-align: center; margin-top: 40px;">NUESTRA COLECCIÓN</h2>
        
        <div class="tienda-grid">
            <div class="product-card">
                <img src="./images/tienda/Sneakers.png" alt="Sneakers Negras">
                <h3>Tenis blancos</h3>
                <p style="font-weight: bold; font-size: 1.2rem; margin: 10px 0;">$200</p>
                <button class="btn-cart" style="width: 100%;">🛒 ADD TO CART</button>
            </div>

            <div class="product-card">
                <img src="./images/tienda/Sneakers3.png" alt="Sneakers Rojas">
                <h3>Tenis rojos</h3>
                <p style="font-weight: bold; font-size: 1.2rem; margin: 10px 0;">$200</p>
                <button class="btn-cart" style="width: 100%;">🛒 ADD TO CART</button>
            </div>

              <div class="product-card">
                <img src="./images/tienda/Sneakers2.png" alt="Sneakers Rojas">
                <h3>Tenis negros y rojos</h3>
                <p style="font-weight: bold; font-size: 1.2rem; margin: 10px 0;">$200</p>
                <button class="btn-cart" style="width: 100%;">🛒 ADD TO CART</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="socials">
            <img src="./images/nosotros/facebook-icon.png" alt="Facebook">
            <img src="./images/nosotros/instagram-logo.png" alt="Instagram">
        </div>
        <p>ALL SHOES 2026</p>
    </footer>

</html>
